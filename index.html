<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kombuchajournal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --amber: #B5620A;
    --amber-dark: #8C4A06;
    --amber-light: #F5E6D0;
    --amber-pale: #FDF6EE;
    --teal: #0D6B52;
    --teal-light: #D4EDE6;
    --coral: #8B3A28;
    --text: #2A1F14;
    --text-muted: #7A6555;
    --border: #E2D0BC;
    --surface: #FFFAF5;
    --white: #FFFFFF;
    --danger: #9B2020;
    --radius: 10px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--amber-pale); color: var(--text); min-height: 100vh; font-size: 15px; }
  h1,h2,h3,.serif { font-family: 'Playfair Display', serif; }

  header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 920px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 58px; }
  .logo { display: flex; align-items: center; gap: 10px; cursor:pointer; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--amber); }
  .logo h1 { font-size: 19px; color: var(--text); }
  .header-nav { display:flex; gap:4px; align-items:center; }
  .nav-btn { background:none; border:none; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text-muted); padding:6px 12px; border-radius:var(--radius); cursor:pointer; }
  .nav-btn:hover { background:var(--amber-pale); color:var(--text); }
  .nav-btn.active { color:var(--amber); font-weight:500; }

  main { max-width: 920px; margin: 0 auto; padding: 28px 20px 60px; }

  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 18px; border-radius:var(--radius); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; border:none; transition:opacity 0.15s,transform 0.1s; }
  .btn:active { transform:scale(0.97); }
  .btn-primary { background:var(--amber); color:#fff; }
  .btn-primary:hover { opacity:0.9; }
  .btn-secondary { background:var(--white); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { background:var(--amber-pale); }
  .btn-ghost { background:none; color:var(--text-muted); border:none; font-size:13px; }
  .btn-ghost:hover { color:var(--text); }
  .btn-danger { background:none; color:var(--danger); border:1px solid #e8b4b4; font-size:13px; padding:6px 12px; }
  .btn-danger:hover { background:#fdf0f0; }
  .btn-sm { padding:5px 12px; font-size:13px; }
  .btn-icon { width:28px; height:28px; padding:0; display:inline-flex; align-items:center; justify-content:center; border-radius:6px; font-size:16px; border:1px solid var(--border); background:var(--white); color:var(--text-muted); cursor:pointer; flex-shrink:0; }
  .btn-icon:hover { background:var(--amber-pale); color:var(--amber); border-color:var(--amber); }
  .btn-icon.remove { border-color:#e8b4b4; color:var(--danger); }
  .btn-icon.remove:hover { background:#fdf0f0; }

  .card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; }
  .card+.card { margin-top:12px; }

  /* Dashboard */
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:28px; }
  .stat-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px 18px; }
  .stat-label { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-muted); margin-bottom:6px; }
  .stat-value { font-size:26px; font-family:'Playfair Display',serif; color:var(--text); line-height:1; }
  .stat-sub { font-size:12px; color:var(--text-muted); margin-top:4px; }
  .stat-stars { font-size:16px; color:var(--amber); margin-top:4px; }

  .dash-section-title { font-family:'Playfair Display',serif; font-size:17px; margin-bottom:14px; }
  .dash-two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:28px; }

  .recent-list { display:flex; flex-direction:column; gap:8px; }
  .recent-item { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:var(--amber-pale); border-radius:var(--radius); cursor:pointer; transition:background 0.15s; }
  .recent-item:hover { background:var(--amber-light); }
  .recent-name { font-size:14px; font-weight:500; }
  .recent-date { font-size:12px; color:var(--text-muted); }
  .recent-right { text-align:right; flex-shrink:0; margin-left:10px; }
  .recent-flavor { font-size:12px; color:var(--text-muted); max-width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .flavor-tags { display:flex; flex-wrap:wrap; gap:6px; }
  .flavor-tag { background:var(--amber-light); color:var(--amber-dark); font-size:12px; padding:4px 10px; border-radius:20px; font-weight:500; }
  .flavor-tag .count { opacity:0.65; margin-left:3px; font-size:11px; }

  .batch-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; margin-top:4px; }
  .batch-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px 20px; cursor:pointer; transition:border-color 0.15s,box-shadow 0.15s; }
  .batch-card:hover { border-color:var(--amber); box-shadow:0 2px 12px rgba(181,98,10,0.08); }
  .batch-card-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .batch-card-name { font-size:15px; font-weight:500; }
  .batch-card-date { font-size:12px; color:var(--text-muted); margin-top:2px; }
  .batch-card-flavor { font-size:12px; color:var(--text-muted); margin-top:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .empty { text-align:center; padding:60px 20px; color:var(--text-muted); }
  .empty-icon { font-size:48px; margin-bottom:12px; }

  .section-label { display:flex; align-items:center; gap:8px; margin:28px 0 14px; }
  .section-label:first-child { margin-top:0; }
  .section-accent { width:3px; height:16px; border-radius:2px; flex-shrink:0; }
  .section-label span { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-muted); }

  .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; }
  .form-field { display:flex; flex-direction:column; gap:5px; }
  .form-field.full { grid-column:1/-1; }
  label { font-size:12px; color:var(--text-muted); font-weight:500; }
  input[type=text],input[type=date],input[type=number],textarea {
    font-family:'DM Sans',sans-serif; font-size:14px; padding:8px 11px;
    border:1px solid var(--border); border-radius:var(--radius);
    background:var(--surface); color:var(--text); width:100%; transition:border-color 0.15s;
  }
  input:focus,textarea:focus { outline:none; border-color:var(--amber); background:var(--white); }
  textarea { resize:vertical; min-height:70px; line-height:1.5; }

  .dynamic-list { display:flex; flex-direction:column; gap:8px; }
  .dynamic-row { display:flex; align-items:center; gap:8px; }
  .dynamic-row input { flex:1; min-width:0; }
  .dynamic-row input.narrow { flex:0 0 90px; }
  .add-row-btn { display:flex; align-items:center; justify-content:center; gap:6px; font-size:13px; color:var(--amber); background:none; border:1px dashed var(--amber); border-radius:var(--radius); padding:7px 12px; cursor:pointer; margin-top:6px; width:100%; font-family:'DM Sans',sans-serif; }
  .add-row-btn:hover { background:var(--amber-pale); }

  .stars-input { display:flex; gap:4px; margin-top:2px; }
  .star-btn { background:none; border:none; cursor:pointer; font-size:22px; padding:0; line-height:1; color:#DDD; transition:color 0.1s,transform 0.1s; }
  .star-btn:hover,.star-btn.active { color:var(--amber); }
  .star-btn:active { transform:scale(1.2); }
  .rating-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
  .rating-row:last-child { border-bottom:none; }
  .rating-label { font-size:13px; color:var(--text-muted); }

  .detail-row { display:flex; gap:12px; padding:7px 0; border-bottom:1px solid #F0E8DF; font-size:14px; }
  .detail-row:last-child { border-bottom:none; }
  .detail-key { color:var(--text-muted); min-width:160px; flex-shrink:0; }
  .detail-note { font-size:13px; color:var(--text-muted); font-style:italic; margin-top:8px; line-height:1.6; }

  .pill-list { display:flex; flex-wrap:wrap; gap:6px; }
  .pill { background:var(--amber-pale); border:1px solid var(--border); border-radius:20px; padding:4px 11px; font-size:13px; display:inline-flex; align-items:center; gap:4px; }
  .pill .amount { color:var(--text-muted); font-size:12px; }

  .tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:24px; overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { padding:10px 18px; font-size:14px; font-weight:400; color:var(--text-muted); background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; white-space:nowrap; transition:color 0.15s; margin-bottom:-1px; }
  .tab.active { color:var(--amber); border-bottom-color:var(--amber); font-weight:500; }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  .form-actions { display:flex; justify-content:space-between; align-items:center; padding-top:20px; margin-top:20px; border-top:1px solid var(--border); }
  .form-actions-right { display:flex; gap:8px; align-items:center; }

  .page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; gap:12px; }
  .page-title { font-size:22px; font-family:'Playfair Display',serif; }
  .page-subtitle { font-size:13px; color:var(--text-muted); margin-top:2px; }

  .detail-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; gap:12px; }
  .detail-title { font-size:24px; font-family:'Playfair Display',serif; }
  .detail-date { font-size:13px; color:var(--text-muted); margin-top:3px; }

  .breadcrumb { font-size:13px; color:var(--text-muted); margin-bottom:18px; }
  .breadcrumb a { color:var(--amber); text-decoration:none; cursor:pointer; }
  .breadcrumb a:hover { text-decoration:underline; }

  #toast { position:fixed; bottom:24px; right:24px; background:var(--text); color:#fff; padding:10px 18px; border-radius:var(--radius); font-size:13px; opacity:0; transition:opacity 0.25s; pointer-events:none; z-index:999; }
  #toast.show { opacity:1; }

  .bottle-card { border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:10px; background:var(--surface); }
  .bottle-card-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .bottle-number { font-size:11px; font-weight:500; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; white-space:nowrap; }

  /* Tips section */
  .tips-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; margin-bottom:12px; }
  .tip-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px 20px; }
  .tip-card-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .tip-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .tip-card-title { font-size:14px; font-weight:500; }
  .tip-list { list-style:none; display:flex; flex-direction:column; gap:7px; }
  .tip-list li { font-size:13px; color:var(--text-muted); line-height:1.5; padding-left:14px; position:relative; }
  .tip-list li::before { content:'·'; position:absolute; left:0; color:var(--amber); font-size:16px; line-height:1.3; }
  .tip-list li strong { color:var(--text); font-weight:500; }
  .tip-alert { background:var(--amber-pale); border:1px solid var(--amber-light); border-radius:var(--radius); padding:12px 14px; font-size:13px; line-height:1.6; color:var(--text-muted); margin-bottom:12px; }
  .tip-alert strong { color:var(--amber-dark); }
  .fruit-grid { display:flex; flex-wrap:wrap; gap:5px; }
  .fruit-chip { font-size:12px; padding:3px 9px; border-radius:20px; border:1px solid var(--border); }
  .fruit-chip.great { background:#EBF7F1; border-color:#A8DFC4; color:#0A5C3A; }
  .fruit-chip.good  { background:var(--amber-pale); border-color:var(--amber-light); color:var(--amber-dark); }
  .fruit-chip.ok    { background:#F5F5F5; border-color:#DDD; color:#555; }
  .fruit-chip.bad   { background:#FDF0F0; border-color:#F0B4B4; color:var(--danger); }
  .timing-row { display:flex; gap:10px; align-items:flex-start; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .timing-row:last-child { border-bottom:none; }
  .timing-label { font-weight:500; min-width:130px; flex-shrink:0; color:var(--text); }
  .timing-val { color:var(--text-muted); line-height:1.5; }

  @media (max-width:620px) {
    main { padding:20px 14px 60px; }
    .card { padding:18px 16px; }
    .batch-grid,.dash-two-col { grid-template-columns:1fr; }
    .stat-grid { grid-template-columns:repeat(2,1fr); }
    .detail-key { min-width:110px; }
    .form-grid { grid-template-columns:1fr; }
    .dynamic-row input.narrow { flex:0 0 72px; }
    .header-nav .nav-btn { padding:6px 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo" onclick="render('dashboard')">
      <div class="logo-dot"></div>
      <h1>Kombuchajournal</h1>
    </div>
    <div class="header-nav">
      <button class="nav-btn" id="nav-dashboard" onclick="render('dashboard')">Oversikt</button>
      <button class="nav-btn" id="nav-list" onclick="render('list')">Alle brygg</button>
      <button class="btn btn-secondary btn-sm" onclick="exportData()" style="margin-left:6px">↓ Eksporter</button>
      <label class="btn btn-secondary btn-sm" style="cursor:pointer;margin:0">
        ↑ Importer
        <input type="file" accept=".json" onchange="importData(event)" style="display:none">
      </label>
    </div>
  </div>
</header>

<main id="app"></main>
<div id="toast"></div>

<script>
const STORAGE_KEY = 'kombucha_batches_v2';
let batches = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
function persist() { localStorage.setItem(STORAGE_KEY, JSON.stringify(batches)); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
function exportData() {
  const blob = new Blob([JSON.stringify(batches, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kombucha-journal-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); toast('Data eksportert!');
}
function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imp = JSON.parse(ev.target.result);
      if (!Array.isArray(imp)) throw 0;
      batches = imp; persist(); render('dashboard');
      toast('Import vellykket – ' + imp.length + ' batches lastet inn');
    } catch { toast('Feil: ugyldig fil'); }
  };
  reader.readAsText(file); e.target.value = '';
}

function fmtDate(iso) {
  if (!iso) return '–';
  return new Date(iso).toLocaleDateString('nb-NO', {day:'numeric',month:'short',year:'numeric'});
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function stars(n, sz) { n=n||0; return `<span style="color:var(--amber);font-size:${sz||'14px'}">${'★'.repeat(n)}${'☆'.repeat(5-n)}</span>`; }
function flavorSummary(b) {
  const bottles = b.f2?.bottles;
  if (bottles?.length) {
    const all = bottles.flatMap(bt=>bt.ingredients||[]).map(x=>x.ingredient).filter(Boolean);
    return [...new Set(all)].join(', ');
  }
  const it = b.f2?.flavoringItems;
  if (it?.length) return it.map(x=>x.ingredient).filter(Boolean).join(', ');
  return b.f2?.flavorings || '';
}

// ─── Router ───────────────────────────────────────────────────────────────────
let currentView = 'dashboard', editingIdx = null;

function setNav(v) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const el = document.getElementById('nav-'+v); if (el) el.classList.add('active');
}
function render(view, idx) {
  currentView = view; editingIdx = idx !== undefined ? idx : null;
  const app = document.getElementById('app');
  if (view==='dashboard') { setNav('dashboard'); app.innerHTML = renderDashboard(); bindTipsCalc(); }
  else if (view==='list')  { setNav('list');      app.innerHTML = renderList(); }
  else if (view==='new')   { setNav('list');      app.innerHTML = renderForm(null); }
  else if (view==='edit')  { setNav('list');      app.innerHTML = renderForm(batches[idx]); }
  else if (view==='detail'){ setNav('list');      app.innerHTML = renderDetail(batches[idx], idx); }
  bindEvents();
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function renderDashboard() {
  if (!batches.length) return `
    <div class="page-header">
      <div><p class="page-title">Oversikt</p></div>
      <button class="btn btn-primary" onclick="render('new')">+ Ny batch</button>
    </div>
    <div class="empty"><div class="empty-icon">🫙</div><p>Ingen batches ennå — lag ditt første brygg!</p></div>
    ${renderTips()}`;

  const teaCount = {};
  batches.forEach(b=>{ const t=b.f1?.teaType; if(t) teaCount[t]=(teaCount[t]||0)+1; });
  const topTea = Object.entries(teaCount).sort((a,b)=>b[1]-a[1])[0];

  const flavorCount = {};
  batches.forEach(b=>{
    const bottles = b.f2?.bottles;
    if (bottles?.length) {
      bottles.flatMap(bt=>bt.ingredients||[]).forEach(x=>{ if(x.ingredient){ const k=x.ingredient.toLowerCase(); flavorCount[k]=(flavorCount[k]||0)+1; }});
    } else {
      const it=b.f2?.flavoringItems;
      if (it?.length) it.forEach(x=>{ if(x.ingredient){ const k=x.ingredient.toLowerCase(); flavorCount[k]=(flavorCount[k]||0)+1; }});
      else if (b.f2?.flavorings) b.f2.flavorings.split(',').forEach(s=>{ const k=s.trim().split(' ')[0].toLowerCase(); if(k) flavorCount[k]=(flavorCount[k]||0)+1; });
    }
  });
  const topFlavors = Object.entries(flavorCount).sort((a,b)=>b[1]-a[1]).slice(0,12);

  const best = batches.reduce((b,x)=>(!b||(x.results?.overall||0)>(b.results?.overall||0))?x:b, null);
  const bestIdx = batches.indexOf(best);
  const recent = batches.slice(0,5);

  return `
    <div class="page-header">
      <div><p class="page-title">Oversikt</p></div>
      <button class="btn btn-primary" onclick="render('new')">+ Ny batch</button>
    </div>
    <div class="stat-grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));max-width:480px">
      <div class="stat-card">
        <div class="stat-label">Totalt brygg</div>
        <div class="stat-value">${batches.length}</div>
        <div class="stat-sub">${topTea?'Mest brukt te: '+esc(topTea[0]):'Kom i gang!'}</div>
      </div>
      ${best?.results?.overall?`<div class="stat-card">
        <div class="stat-label">Beste batch</div>
        <div class="stat-value" style="font-size:18px">${esc(best.name||'Uten navn')}</div>
        <div class="stat-stars">${'★'.repeat(best.results.overall)}${'☆'.repeat(5-best.results.overall)}</div>
      </div>`:''}
    </div>
    <div class="dash-two-col">
      <div>
        <p class="dash-section-title">Siste brygg</p>
        <div class="recent-list">
          ${recent.map((b,i)=>`
            <div class="recent-item" onclick="render('detail',${i})">
              <div style="min-width:0">
                <div class="recent-name">${esc(b.name||'Uten navn')}</div>
                <div class="recent-date">${fmtDate(b.startDate)}</div>
              </div>
              <div class="recent-right">
                ${b.results?.overall?stars(b.results.overall,'12px'):'<span style="font-size:12px;color:var(--text-muted)">Ikke vurdert</span>'}
                ${flavorSummary(b)?`<div class="recent-flavor">${esc(flavorSummary(b))}</div>`:''}
              </div>
            </div>`).join('')}
        </div>
        ${batches.length>5?`<button class="btn btn-ghost" style="margin-top:10px;width:100%;justify-content:center" onclick="render('list')">Se alle ${batches.length} brygg →</button>`:''}
      </div>
      <div>
        <p class="dash-section-title">Beste batch</p>
        ${best?.results?.overall?`
          <div class="recent-item" onclick="render('detail',${bestIdx})">
            <div style="min-width:0">
              <div class="recent-name">${esc(best.name||'Uten navn')}</div>
              <div class="recent-date">${fmtDate(best.startDate)}</div>
            </div>
            <div class="recent-right">
              ${stars(best.results.overall,'14px')}
              ${flavorSummary(best)?`<div class="recent-flavor">${esc(flavorSummary(best))}</div>`:''}
            </div>
          </div>` : '<p style="font-size:13px;color:var(--text-muted)">Ingen vurderinger ennå.</p>'}
        <p class="dash-section-title" style="margin-top:24px">Smakstilsetninger brukt</p>

function renderTips() { return TIPS_HTML; }

function calcSugar() {
  const el = document.getElementById('calc-liters');
  const out = document.getElementById('calc-result');
  if (!el || !out) return;
  const l = parseFloat(el.value);
  if (!l || l <= 0) { out.innerHTML = ''; return; }
  const dlMin = +(l * 0.5).toFixed(1);
  const dlMax = +(l * 0.6).toFixed(1);
  const gMin = Math.round(l * 0.5 * 100);
  const gMax = Math.round(l * 0.6 * 100);
  const starter = Math.round(l * (300/3));
  out.innerHTML = `
    <span style="font-size:18px;font-weight:500;color:var(--amber)">${dlMin}–${dlMax} dl sukker</span>
    <span style="font-size:13px;color:var(--text-muted);margin-left:6px">(${gMin}–${gMax} g)</span>
    <br><span style="font-size:13px;color:var(--text-muted)">+ ca. ${starter} ml startervæske</span>`;
}

function bindTipsCalc() {
  calcSugar();
}

  formState = editingIdx!==null ? JSON.parse(JSON.stringify(batches[editingIdx])) : EMPTY_BATCH();

  if (!f2.bottles) {
    const ingredients = f2.flavoringItems?.filter(x=>x.ingredient) || (f2.flavorings ? [{ingredient:f2.flavorings,amount:''}] : []);
    const oldBottles = f2.bottleItems?.filter(x=>x.count||x.size) || (f2.bottleCount||f2.bottleSize ? [{count:f2.bottleCount||'',size:f2.bottleSize||''}] : []);
    if (oldBottles.length) {
      f2.bottles = oldBottles.map((b,i) => ({
        size: (b.count ? b.count+' × ' : '') + (b.size||''),
        ingredients: i===0 ? (ingredients.length ? ingredients : [{ingredient:'',amount:''}]) : [{ingredient:'',amount:''}]
      }));
    } else {
      f2.bottles = [{size:'', ingredients: ingredients.length ? ingredients : [{ingredient:'',amount:''}]}];

  f2.bottles.forEach(b => { if (!b.ingredients?.length) b.ingredients=[{ingredient:'',amount:''}]; });

function collectSimple() {
  const g = (id,def='') => { const el=document.getElementById(id); return el?el.value:def; };
  formState.name = g('f-name');
  formState.startDate = g('f-startDate');
  ['teaType','teaAmount','sugarType','sugarAmount','waterAmount','scoby','starterTea','temperature','pHStart','pHEnd','duration','notes']
    .forEach(k => { const el=document.getElementById('f-f1-'+k); if(el) formState.f1[k]=el.value; });
  ['temperature','duration','notes']
    .forEach(k => { const el=document.getElementById('f-f2-'+k); if(el) formState.f2[k]=el.value; });
  const t=document.getElementById('f-results-taste'); if(t) formState.results.taste=t.value;
  const n=document.getElementById('f-results-notes'); if(n) formState.results.notes=n.value;
}

function saveBatch() {
  collectSimple();
  if (!formState.name && !formState.startDate) {
    document.getElementById('save-hint').textContent = 'Fyll inn navn eller dato';
    return;
  }
  const saved = JSON.parse(JSON.stringify(formState));
  if (editingIdx!==null) batches[editingIdx]=saved;
  else batches.unshift(saved);
  persist();
  toast(editingIdx!==null?'Batch oppdatert!':'Ny batch lagret!');
  render(editingIdx!==null?'detail':'list', editingIdx!==null?editingIdx:0);
}

      <div class="section-label" style="margin-top:24px"><div class="section-accent" style="background:var(--amber)"></div><span>F1 — Første fermentering</span></div>
      ${row('Tetype',f1.teaType)}${row('Mengde te',f1.teaAmount)}
      ${row('Sukkertype',f1.sugarType)}${row('Mengde sukker',f1.sugarAmount)}${row('Mengde vann',f1.waterAmount)}
      ${row('SCOBY',f1.scoby)}${row('Startervæske',f1.starterTea)}
      ${row('Temperatur',f1.temperature?f1.temperature+' °C':'')}
      ${row('pH start → slutt',ph)}
      ${row('Varighet',f1.duration?f1.duration+' dager':'')}
      ${f1.notes?`<p class="detail-note">${esc(f1.notes)}</p>`:''}

      <div class="section-label"><div class="section-accent" style="background:var(--coral)"></div><span>F2 — Andre fermentering / kullsyrning</span></div>
      ${bottlesDetailHTML}
      ${row('Temperatur',f2.temperature?f2.temperature+' °C':'')}
      ${row('Varighet',f2.duration?f2.duration+' dager':'')}
      ${f2.notes?`<p class="detail-note">${esc(f2.notes)}</p>`:''}

      <div class="section-label"><div class="section-accent" style="background:var(--teal)"></div><span>Resultat</span></div>
      ${r.taste?`<p style="font-size:15px;line-height:1.6;margin-bottom:14px">${esc(r.taste)}</p>`:''}
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px">
        ${[['Sødme',r.sweetness],['Syrlighet',r.acidity],['Kullsyre',r.carbonation],['Helhet',r.overall]].map(([l,v])=>`
          <div style="background:var(--amber-pale);border-radius:var(--radius);padding:10px 12px">
            <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${l}</div>
            <div style="font-size:15px;color:var(--amber)">${v?'★'.repeat(v)+'☆'.repeat(5-v):'–'}</div>
          </div>`).join('')}
      </div>
      ${r.notes?`<p class="detail-note" style="margin-top:14px">${esc(r.notes)}</p>`:''}
    </div>`;
}

function deleteBatch(idx) {
  if (!confirm('Er du sikker på at du vil slette denne batchen?')) return;
  batches.splice(idx,1); persist(); toast('Batch slettet'); render('list');
}

// ─── Events ───────────────────────────────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      if (currentView==='new'||currentView==='edit') collectSimple();
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.querySelector(`[data-panel="${tab.dataset.tab}"]`)?.classList.add('active');
    });
  });
}

render('dashboard');
</script>
</body>
</html>
